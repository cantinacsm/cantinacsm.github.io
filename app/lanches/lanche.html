<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lanche</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  background:#d60000;
  color:white;
  text-align:center;
  padding:15px;
  font-size:20px;
}

/* CENTRALIZAÇÃO */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.produto-box{
  display:flex;
  gap:30px;
  align-items:center;
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
  max-width:900px;
  width:100%;
  flex-wrap:wrap;
}

img{
  width:320px;
  max-width:100%;
  border-radius:10px;
}

.info{
  flex:1;
}

.nome{
  font-size:26px;
  font-weight:bold;
}

.preco{
  color:#d60000;
  font-size:22px;
  margin:10px 0;
}

.quantidade{
  display:flex;
  align-items:center;
  gap:15px;
  margin:20px 0;
}

.qtd-btn{
  width:40px;
  height:40px;
  border:none;
  background:#d60000;
  color:white;
  font-size:20px;
  border-radius:8px;
  cursor:pointer;
}

#qtd{
  font-size:20px;
  width:40px;
  text-align:center;
}

.comprar{
  background:#d60000;
  color:white;
  border:none;
  padding:14px;
  width:220px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>Cantina APP</header>

<div class="container">

  <div class="produto-box">

    <img id="imagem">

    <div class="info">
      <div id="nome" class="nome"></div>
      <div id="preco" class="preco"></div>

      <div class="quantidade">
        <button class="qtd-btn" onclick="menos()">-</button>
        <div id="qtd">1</div>
        <button class="qtd-btn" onclick="mais()">+</button>
      </div>

      <button class="comprar"
        onclick="alert('Funcionalidade ainda será criada!')">
        Finalizar Pedido
      </button>
    </div>

  </div>

</div>

<script>

const param = decodeURIComponent(
  location.search.split(":")[1]
);

let precoBase=0;
let quantidade=1;

fetch("../produtos.json")
.then(r=>r.json())
.then(produtos=>{

  const produto=produtos.find(p=>p.id===param);

  document.getElementById("imagem").src="../"+produto.imagem;
  document.getElementById("nome").textContent=produto.nome;

  precoBase=produto.preco;
  atualizarPreco();
});

function atualizarPreco(){
  document.getElementById("preco")
    .textContent="R$ "+(precoBase*quantidade).toFixed(2);
}

function mais(){
  quantidade++;
  document.getElementById("qtd").textContent=quantidade;
  atualizarPreco();
}

function menos(){
  if(quantidade>1){
    quantidade--;
    document.getElementById("qtd").textContent=quantidade;
    atualizarPreco();
  }
}

</script>

</body>
</html>
