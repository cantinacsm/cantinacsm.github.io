<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lanche</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🥪</text></svg>">
<style>
:root{
  --body-bg:#f4f4f4;
  --header-bg:#d60000;
  --header-text:#ffffff;
  --footer-bg:#111111;
  --footer-text:#ffffff;
  --accent:#d60000;
  --accent-text:#ffffff;
  --card-bg:#ffffff;
  --card-text:#141414;
  --muted-text:#4b4b4b;
  --shadow:rgba(0,0,0,.15);
  --link:#ff4d4d;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--body-bg);
  color:var(--card-text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
header{
  background:var(--header-bg);
  color:var(--header-text);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:15px;
  font-size:20px;
}

/* botão voltar */
.voltar{
  position:absolute;
  left:15px;
  font-size:22px;
  cursor:pointer;
  text-decoration:none;
  color:var(--header-text);
}

/* titulo clicável */
.titulo{
  cursor:pointer;
  font-weight:bold;
}

/* ===== CENTRALIZAÇÃO (MEIO EM CIMA) ===== */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px 20px;
}

/* ===== CARD ===== */
.produto-box{
  display:flex;
  gap:30px;
  align-items:center;
  background:var(--card-bg);
  padding:25px;
  border-radius:14px;
  box-shadow:0 4px 15px var(--shadow);
  max-width:900px;
  width:100%;
}

/* imagem desktop */
img{
  width:320px;
  max-width:100%;
  border-radius:10px;
}

/* info */
.info{
  flex:1;
  display:flex;
  flex-direction:column;
}

.nome{
  font-size:26px;
  font-weight:bold;
}

.preco{
  color:var(--accent);
  font-size:22px;
  margin:10px 0;
}

.quantidade{
  display:flex;
  align-items:center;
  gap:15px;
  margin:20px 0;
}

.qtd-btn{
  width:40px;
  height:40px;
  border:none;
  background:var(--accent);
  color:var(--accent-text);
  font-size:20px;
  border-radius:8px;
  cursor:pointer;
}

#qtd{
  font-size:20px;
  width:40px;
  text-align:center;
}

.comprar{
  background:var(--accent);
  color:var(--accent-text);
  border:none;
  padding:14px;
  width:220px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  margin-top:auto;
}

/* ===== MOBILE ===== */
@media (max-width:700px){

  .produto-box{
    flex-direction:column;
    text-align:center;
  }

  img{
    width:100%;
    max-width:350px;
  }

  .info{
    width:100%;
    align-items:center;
  }

  .comprar{
    width:100%;
  }
}

</style>
</head>

<body>

<header>
  <a class="voltar" href="https://cantinacsm.github.io">←</a>

  <div class="titulo"
       onclick="location.href='https://cantinacsm.github.io/app/index.html'">
       Cantina APP
  </div>
</header>

<div class="container">

  <div class="produto-box">

    <img id="imagem" alt="Produto">

    <div class="info">
      <div id="nome" class="nome"></div>
      <div id="preco" class="preco"></div>

      <div class="quantidade">
        <button class="qtd-btn" onclick="menos()">-</button>
        <div id="qtd">1</div>
        <button class="qtd-btn" onclick="mais()">+</button>
      </div>

      <button class="comprar"
        onclick="alert('Funcionalidade ainda será criada!')">
        Finalizar Pedido
      </button>
    </div>

  </div>

</div>


<script>
async function carregarTema(){
  try{
    const cfgResponse = await fetch("../styles/theme-config.json");
    const cfg = await cfgResponse.json();

    const temaAtivo = cfg.activeTheme || "default-theme.json";
    const temaResponse = await fetch(`../styles/${temaAtivo}`);
    const tema = await temaResponse.json();

    aplicarTema(tema.colors || {});
  }catch(err){
    console.warn("Não foi possível carregar o tema por JSON. Mantendo padrão.", err);
  }
}

function aplicarTema(colors){
  const root = document.documentElement;
  root.style.setProperty("--body-bg", colors.bodyBg || "#f4f4f4");
  root.style.setProperty("--header-bg", colors.headerBg || "#d60000");
  root.style.setProperty("--header-text", colors.headerText || "#ffffff");
  root.style.setProperty("--footer-bg", colors.footerBg || "#111111");
  root.style.setProperty("--footer-text", colors.footerText || "#ffffff");
  root.style.setProperty("--accent", colors.accent || "#d60000");
  root.style.setProperty("--accent-text", colors.accentText || "#ffffff");
  root.style.setProperty("--card-bg", colors.cardBg || "#ffffff");
  root.style.setProperty("--card-text", colors.cardText || "#141414");
  root.style.setProperty("--muted-text", colors.mutedText || "#4b4b4b");
  root.style.setProperty("--shadow", colors.shadow || "rgba(0,0,0,.15)");
  root.style.setProperty("--link", colors.link || "#ff4d4d");
}

carregarTema();
  
/* ===== PEGAR PARAMETRO ===== */
const param = decodeURIComponent(
  location.search.split(":")[1]
);

let precoBase = 0;
let quantidade = 1;

fetch("../produtos.json")
.then(r => r.json())
.then(produtos => {

  const produto = produtos.find(p => p.id === param);

  document.getElementById("imagem").src = produto.imagem;
  document.getElementById("nome").textContent = produto.nome;

  precoBase = produto.preco;
  atualizarPreco();
});

/* ===== PREÇO ===== */
function atualizarPreco(){
  document.getElementById("preco")
    .textContent = "R$ " + (precoBase * quantidade).toFixed(2);
}

/* ===== QUANTIDADE ===== */
function mais(){
  quantidade++;
  document.getElementById("qtd").textContent = quantidade;
  atualizarPreco();
}

function menos(){
  if(quantidade > 1){
    quantidade--;
    document.getElementById("qtd").textContent = quantidade;
    atualizarPreco();
  }
}

</script>
</body>
</html>
