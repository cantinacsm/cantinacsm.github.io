<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lanche</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
header{
  background:#d60000;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:15px;
  font-size:20px;
}

/* botão voltar */
.voltar{
  position:absolute;
  left:15px;
  font-size:22px;
  cursor:pointer;
  text-decoration:none;
  color:white;
}

/* titulo clicável */
.titulo{
  cursor:pointer;
  font-weight:bold;
}

/* ===== CENTRALIZAÇÃO (MEIO EM CIMA) ===== */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start; /* fica no meio horizontal e em cima vertical */
  padding:30px 20px;
}

/* ===== CARD ===== */
.produto-box{
  display:flex;
  gap:30px;
  align-items:center;
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
  max-width:900px;
  width:100%;
}

/* imagem desktop */
img{
  width:320px;
  max-width:100%;
  border-radius:10px;
}

/* info */
.info{
  flex:1;
  display:flex;
  flex-direction:column;
}

.nome{
  font-size:26px;
  font-weight:bold;
}

.preco{
  color:#d60000;
  font-size:22px;
  margin:10px 0;
}

.quantidade{
  display:flex;
  align-items:center;
  gap:15px;
  margin:20px 0;
}

.qtd-btn{
  width:40px;
  height:40px;
  border:none;
  background:#d60000;
  color:white;
  font-size:20px;
  border-radius:8px;
  cursor:pointer;
}

#qtd{
  font-size:20px;
  width:40px;
  text-align:center;
}

.comprar{
  background:#d60000;
  color:white;
  border:none;
  padding:14px;
  width:220px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  margin-top:auto; /* botão sempre por último */
}

/* ===== MOBILE ===== */
@media (max-width:700px){

  .produto-box{
    flex-direction:column; /* imagem em cima */
    text-align:center;
  }

  img{
    width:100%;
    max-width:350px;
  }

  .info{
    width:100%;
    align-items:center;
  }

  .comprar{
    width:100%;
  }
}

</style>
</head>

<body>
  
<header>
  <a class="voltar" href="https://cantinacsm.github.io">←</a>

  <div class="titulo"
       onclick="location.href='https://cantinacsm.github.io/app/index.html'">
       Cantina APP
  </div>
</header>

<div class="container">

  <div class="produto-box">

    <img id="imagem">

    <div class="info">
      <div id="nome" class="nome"></div>
      <div id="preco" class="preco"></div>

      <div class="quantidade">
        <button class="qtd-btn" onclick="menos()">-</button>
        <div id="qtd">1</div>
        <button class="qtd-btn" onclick="mais()">+</button>
      </div>

      <button class="comprar"
        onclick="alert('Funcionalidade ainda será criada!')">
        Finalizar Pedido
      </button>
    </div>

  </div>

</div>

<script>

/* ===== PEGAR PARAMETRO ===== */
const param = decodeURIComponent(
  location.search.split(":")[1]
);

let precoBase = 0;
let quantidade = 1;

fetch("../produtos.json")
.then(r => r.json())
.then(produtos => {

  const produto = produtos.find(p => p.id === param);

  document.getElementById("imagem").src = produto.imagem;
  document.getElementById("nome").textContent = produto.nome;

  precoBase = produto.preco;
  atualizarPreco();
});

/* ===== PREÇO ===== */
function atualizarPreco(){
  document.getElementById("preco")
    .textContent = "R$ " + (precoBase * quantidade).toFixed(2);
}

/* ===== QUANTIDADE ===== */
function mais(){
  quantidade++;
  document.getElementById("qtd").textContent = quantidade;
  atualizarPreco();
}

function menos(){
  if(quantidade > 1){
    quantidade--;
    document.getElementById("qtd").textContent = quantidade;
    atualizarPreco();
  }
}

</script>
</body>
</html>
