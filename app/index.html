<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cantina APP</title>

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f4f4;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  background:#d60000;
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* AREA PRINCIPAL */
main{
  flex:1;
}

/* GRID */
#produtos{
  padding:15px;
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
  max-width:1100px;
  margin:auto;
}

@media(min-width:700px){
  #produtos{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(min-width:1000px){
  #produtos{
    grid-template-columns:repeat(3,1fr);
  }
}

/* CARD MENOR */
.card{
  background:white;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.12);
  overflow:hidden;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.nome{
  font-size:16px;
  font-weight:bold;
}

.preco{
  color:#d60000;
  margin:6px 0;
}

button{
  width:100%;
  border:none;
  background:#d60000;
  color:white;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* FOOTER FIXO */
footer{
  background:#111;
  color:white;
  text-align:center;
  padding:14px;
}

footer a{
  color:#ff4d4d;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>

<body>
  
<header>Cantina APP</header>

<main>
<div id="produtos"></div>
</main>

<footer>
Desenvolvedor: ViquinhoDev ( Vicente Bajay )
</footer>

<script>

fetch("produtos.json")
.then(r=>r.json())
.then(produtos=>{

  const area=document.getElementById("produtos");

  produtos.forEach(p=>{

    area.innerHTML+=`
      <div class="card">
        <img src="${p.imagem}">
        <div class="card-content">
          <div class="nome">${p.nome}</div>
          <div class="preco">R$ ${p.preco.toFixed(2)}</div>

          <button onclick="
            location.href='lanches/lanche.html?id:${p.id}'
          ">
            Comprar
          </button>
        </div>
      </div>
    `;

  });

});

</script>

</body>
</html>
