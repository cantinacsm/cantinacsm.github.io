<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cantina APP</title>

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f4f4;
}

/* HEADER */
header{
  background:#d60000;
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* PRODUTOS */
#produtos{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:white;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

.nome{
  font-size:18px;
  font-weight:bold;
}

.preco{
  color:#d60000;
  margin:8px 0;
  font-size:17px;
}

button{
  width:100%;
  border:none;
  background:#d60000;
  color:white;
  padding:12px;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  background:#b50000;
}

/* FOOTER */
footer{
  margin-top:20px;
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
  font-size:14px;
}

footer a{
  color:#ff4d4d;
  text-decoration:none;
}

</style>
</head>

<body>

<header>Cantina APP</header>

<div id="produtos"></div>

<footer>
  Desenvolvedor: ViquinhoDev ( Vicente Bajay )<br>
  <a href="buymeacoffee.com/viquinhodev" target="_blank">
    Buy me a coffee ☕
  </a>
</footer>

<script>

fetch("produtos.json")
.then(res => res.json())
.then(produtos => {

  const container = document.getElementById("produtos");

  produtos.forEach(p => {

    container.innerHTML += `
      <div class="card">
        <img src="${p.imagem}">
        <div class="card-content">
          <div class="nome">${p.nome}</div>
          <div class="preco">R$ ${p.preco.toFixed(2)}</div>

          <button onclick="
            location.href='lanches/lanche.html?id:${p.id}'
          ">
            Comprar
          </button>
        </div>
      </div>
    `;
  });

});

</script>

</body>
</html>
